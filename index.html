<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StudyTrack – Login</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
</head>
<body class="auth-body">

  <div class="auth-container">
    <div class="auth-brand">
      <span class="brand-icon">📘</span>
      <span class="brand-name">StudyTrack</span>
    </div>

    <!-- LOGIN FORM -->
    <div id="loginForm" class="auth-card">
      <h2>Welcome back</h2>
      <p class="auth-subtitle">Sign in to your account</p>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" />
      </div>

      <p id="loginError" class="error-msg"></p>

      <button class="btn-primary" onclick="loginUser()">Sign In</button>
      <button class="btn-google" onclick="loginWithGoogle()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"/> Sign in with Google
      </button>

      <p class="auth-switch">Don't have an account? <a href="#" onclick="toggleForm()">Sign up</a></p>
    </div>

    <!-- SIGNUP FORM -->
    <div id="signupForm" class="auth-card" style="display:none">
      <h2>Create account</h2>
      <p class="auth-subtitle">Start tracking your progress</p>

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="signupName" placeholder="Aadesh Sonawane" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signupEmail" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signupPassword" placeholder="At least 6 characters" />
      </div>

      <p id="signupError" class="error-msg"></p>

      <button class="btn-primary" onclick="signupUser()">Create Account</button>
      <button class="btn-google" onclick="loginWithGoogle()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"/> Continue with Google
      </button>

      <p class="auth-switch">Already have an account? <a href="#" onclick="toggleForm()">Sign in</a></p>
    </div>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="auth.js"></script>
</body>
</html>
