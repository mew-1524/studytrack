<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StudyTrack – Analytics</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand"><span class="brand-icon">📘</span><span class="brand-name">StudyTrack</span></div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item">🏠 Dashboard</a>
      <a href="marks.html" class="nav-item">📝 Marks</a>
      <a href="tasks.html" class="nav-item">✅ Tasks</a>
      <a href="focus.html" class="nav-item">⏱ Focus Timer</a>
      <a href="analytics.html" class="nav-item active">📊 Analytics</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="sidebarAvatar">A</div>
        <div><p class="user-name" id="sidebarName">Loading...</p><p class="user-role">Student</p></div>
      </div>
      <button class="btn-logout" onclick="logoutUser()">Logout</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="mobile-bar">
      <button class="hamburger" onclick="toggleSidebar()">☰</button>
      <span class="brand-name">StudyTrack</span>
    </div>
    <header class="topbar">
      <div>
        <h1 class="topbar-title">📊 Analytics</h1>
        <p class="topbar-sub">Visual insights into your performance</p>
      </div>
    </header>

    <div class="two-col">
      <div class="card">
        <h3 class="card-title">Subject-wise Scores</h3>
        <canvas id="scoresChart" height="220"></canvas>
      </div>
      <div class="card">
        <h3 class="card-title">Focus Minutes (Last 7 Days)</h3>
        <canvas id="focusChart" height="220"></canvas>
      </div>
    </div>

    <div class="card" style="margin-top:24px;max-width:400px">
      <h3 class="card-title">Task Completion</h3>
      <canvas id="taskChart" height="200"></canvas>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="auth.js"></script>
  <script src="analytics.js"></script>
  <script>function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open')}</script>
</body>
</html>
