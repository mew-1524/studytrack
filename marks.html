<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StudyTrack – Marks</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand"><span class="brand-icon">📘</span><span class="brand-name">StudyTrack</span></div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item">🏠 Dashboard</a>
      <a href="marks.html" class="nav-item active">📝 Marks</a>
      <a href="tasks.html" class="nav-item">✅ Tasks</a>
      <a href="focus.html" class="nav-item">⏱ Focus Timer</a>
      <a href="analytics.html" class="nav-item">📊 Analytics</a>
      <a href="profile.html" class="nav-item">👤 Profile</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="sidebarAvatar">A</div>
        <div><p class="user-name" id="sidebarName">Loading...</p><p class="user-role">Student</p></div>
      </div>
      <button class="btn-logout" onclick="logoutUser()">Logout</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="mobile-bar">
      <button class="hamburger" onclick="toggleSidebar()">☰</button>
      <span class="brand-name">StudyTrack</span>
    </div>
    <header class="topbar">
      <div>
        <h1 class="topbar-title">📝 Marks</h1>
        <p class="topbar-sub">Track your subject-wise scores</p>
      </div>
    </header>

    <div class="card" style="max-width:520px">
      <h3 class="card-title">Add New Score</h3>
      <div class="form-group"><label>Subject</label><input type="text" id="subject" placeholder="e.g. Mathematics"/></div>
      <div class="form-group"><label>Exam / Test Name</label><input type="text" id="examName" placeholder="e.g. Unit Test 1"/></div>
      <div class="form-row">
        <div class="form-group"><label>Marks Obtained</label><input type="number" id="obtained" placeholder="85"/></div>
        <div class="form-group"><label>Total Marks</label><input type="number" id="total" placeholder="100"/></div>
      </div>
      <p id="marksError" class="error-msg"></p>
      <button class="btn-primary" onclick="addMark()">Save Score</button>
    </div>

    <div class="card" style="margin-top:24px">
      <h3 class="card-title">All Scores</h3>
      <table class="data-table">
        <thead><tr><th>Subject</th><th>Exam</th><th>Score</th><th>%</th><th>Action</th></tr></thead>
        <tbody id="marksTable"><tr><td colspan="5" class="empty-state">No scores added yet.</td></tr></tbody>
      </table>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="auth.js"></script>
  <script src="marks.js"></script>
  <script>function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open')}</script>
</body>
</html>
