<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StudyTrack – Tasks</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand"><span class="brand-icon">📘</span><span class="brand-name">StudyTrack</span></div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item">🏠 Dashboard</a>
      <a href="marks.html" class="nav-item">📝 Marks</a>
      <a href="tasks.html" class="nav-item active">✅ Tasks</a>
      <a href="focus.html" class="nav-item">⏱ Focus Timer</a>
      <a href="analytics.html" class="nav-item">📊 Analytics</a>
      <a href="profile.html" class="nav-item">👤 Profile</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="sidebarAvatar">A</div>
        <div><p class="user-name" id="sidebarName">Loading...</p><p class="user-role">Student</p></div>
      </div>
      <button class="btn-logout" onclick="logoutUser()">Logout</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="mobile-bar">
      <button class="hamburger" onclick="toggleSidebar()">☰</button>
      <span class="brand-name">StudyTrack</span>
    </div>
    <header class="topbar">
      <div>
        <h1 class="topbar-title">✅ Tasks</h1>
        <p class="topbar-sub">Manage your study to-dos</p>
      </div>
    </header>

    <div class="card" style="max-width:520px">
      <h3 class="card-title">Add New Task</h3>
      <div class="form-group"><label>Task Title</label><input type="text" id="taskTitle" placeholder="e.g. Finish Chapter 5"/></div>
      <div class="form-row">
        <div class="form-group">
          <label>Priority</label>
          <select id="taskPriority">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
          </select>
        </div>
        <div class="form-group"><label>Due Date</label><input type="date" id="taskDue"/></div>
      </div>
      <p id="taskError" class="error-msg"></p>
      <button class="btn-primary" onclick="addTask()">Add Task</button>
    </div>

    <div class="card" style="margin-top:24px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h3 class="card-title" style="margin:0">All Tasks</h3>
        <div class="filter-tabs">
          <button class="filter-btn active" onclick="filterTasks('all',this)">All</button>
          <button class="filter-btn" onclick="filterTasks('pending',this)">Pending</button>
          <button class="filter-btn" onclick="filterTasks('done',this)">Done</button>
        </div>
      </div>
      <ul class="task-list" id="taskList">
        <li class="empty-state">No tasks yet.</li>
      </ul>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="auth.js"></script>
  <script src="tasks.js"></script>
  <script>function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open')}</script>
</body>
</html>
