<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StudyTrack – Page Not Found</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    .not-found-body {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: var(--bg); text-align: center;
    }
    .not-found-box { max-width: 380px; padding: 20px; }
    .not-found-code { font-size: 96px; font-weight: 700; color: var(--primary); line-height: 1; }
    .not-found-title { font-size: 22px; font-weight: 700; margin: 12px 0 8px; }
    .not-found-sub { color: var(--text-muted); font-size: 15px; margin-bottom: 28px; }
  </style>
</head>
<body class="not-found-body">
  <div class="not-found-box">
    <div class="not-found-code">404</div>
    <h2 class="not-found-title">Page not found</h2>
    <p class="not-found-sub">Looks like this page doesn't exist. Let's get you back on track.</p>
    <a href="index.html"><button class="btn-primary">🏠 Go to Dashboard</button></a>
  </div>
</body>
</html>
